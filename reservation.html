<form action="outpadge.html" >
<fieldset>
<legend><p>Your Reserve Info</p></legend>
<label for="name"><p>Full Name:</p></label>
<input  type="text" id="name" name="name" required placeholder="Marwan Saber Mohamed">

<br> 
 <label for="email"><p>Emaill Address:</p></label>
 <input type="email" id="email" name="email" required placeholder="abcd@example.com">
 <br>
 <label for="phone"><p>Phone Number:</p></label>
<input type="tel" name="phone" id="phone"  pattern="{0-9}{11}" required title="enter a 11-digit phone number" minlength="11" maxlength="11" placeholder="01234567891">

<label for="date"><p class="p-date" >Date:</p></label>
<input type="date" id="date" name="date" required>

<label for="time"><p class="p-time" >Time:</p></label>
<input type="time" id="date" name="date" required>
<br><br>

<label for="message"><p>Special Requests:</p></label>

<textarea name="message" id="message" rows="4" placeholder="Requirments "></textarea>

</fieldset>
<button type="submit" align="center" class="submit-button">Confirm Reservation &rarr;</button>
</form>
